# Build and Publish - Container image release workflow
#
# Builds and pushes the plugins-adapter container image to GHCR on:
#   - Tag push (v*) for versioned releases
#   - Manual trigger for on-demand testing
#
# Image: ghcr.io/kagenti/plugins-adapter/plugins-adapter:<tag>
#
# Multi-arch: amd64 + arm64 via QEMU emulation.
# Base plugin: no PLUGIN_DEPS baked in — consumers install plugins at deploy time.
# To build with a specific plugin, trigger manually and set PLUGIN_DEPS input.
#
# Usage:
#   Tag release:  git tag v1.2.3 && git push origin v1.2.3
#   Manual build: Actions → Build and Publish → Run workflow
#
name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      plugin_deps:
        description: 'Comma-separated plugin names to bake in (e.g. nemocheck). Leave empty for base image.'
        required: false
        default: ''
        type: string

# Deny all permissions at workflow level; each job declares only what it needs
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Determine PLUGIN_DEPS
        id: plugin-deps
        run: |
          # Use manual input if provided, otherwise empty (base image)
          DEPS="${{ github.event.inputs.plugin_deps }}"
          echo "plugin_deps=${DEPS}" >> "$GITHUB_OUTPUT"
          if [ -n "$DEPS" ]; then
            echo "Building with plugins: $DEPS"
          else
            echo "Building base image (no plugins baked in)"
          fi

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PLUGIN_DEPS=${{ steps.plugin-deps.outputs.plugin_deps }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
